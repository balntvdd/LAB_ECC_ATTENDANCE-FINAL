<!DOCTYPE html>
<html>
<head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Scanner</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="/static/style.css">
        <script src="https://unpkg.com/html5-qrcode"></script>
        <style>
                .card { max-width: 700px; margin: 40px auto; }
                #reader { margin: 0 auto; }
        </style>
</head>
<body class="bg-light">

<div class="card shadow-sm">
    <div class="card-body">
        <h3 class="card-title">Scanner</h3>

        <!-- LOGIN -->
        <div id="loginBox">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input class="form-control" type="text" id="username" placeholder="Username">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" id="password" placeholder="Password">
            </div>
            <div class="mb-2">
                <button class="btn btn-primary" onclick="login()">Login</button>
                <span id="loginError" class="text-danger ms-3"></span>
            </div>
        </div>

        <!-- SCANNER -->
        <div id="scannerBox" style="display:none; margin-top:20px;">
            <h5>Scan QR</h5>
            <div id="reader" style="width:320px; height:320px;"></div>
            <div class="mt-3">
                <input class="form-control" type="file" id="qr-input" accept="image/*">
            </div>
            <div class="mt-3"><h6 id="result"></h6></div>
        </div>
    </div>
</div>

<script>

let html5QrCode = null;
let currentCameraId = null;
let cameraActive = false;

async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const headers = {"Content-Type": "application/json"};
    const csrftoken = getCookie('csrftoken');
    if (csrftoken) headers['X-CSRFToken'] = csrftoken;

    const res = await fetch("/api/login/", {
        method: "POST",
        headers,
        body: JSON.stringify({ username, password }),
        credentials: "include" // 🔥 IMPORTANT
    });

    let data = null;
    try { data = await res.json(); } catch(e) { /* ignore non-json */ }

    if (res.ok && data && data.success) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("scannerBox").style.display = "block";
        startScanner();
    } else {
        const msg = data?.error || data?.detail || `${res.status} ${res.statusText}`;
        document.getElementById("loginError").innerText = msg || 'Login failed';
        console.error('Login failed', res.status, data);
    }
}

function processQR(decodedText) {
    document.getElementById('result').innerText = 'Scanning...';

    const headers = {"Content-Type": "application/json"};
    const csrftoken = getCookie('csrftoken');
    if (csrftoken) headers['X-CSRFToken'] = csrftoken;

    if (!csrftoken) {
        console.warn('No CSRF cookie found; the server may reject the request. Ensure cookies/storage are allowed for this site.');
    }

    fetch("/api/verify-attendance/", {
        method: "POST",
        headers,
        body: JSON.stringify({ raw: decodedText }),
        credentials: "include"
    })
    .then(async res => {
        let data = null;
        try { data = await res.json(); } catch(e) { /* not json */ }

        if (res.ok) {
            if (data && data.student) {
                // structured HTML display: Name, ID, Section, Time
                const htmlParts = [];
                const nameLine = data.student_id ? `${data.student} (${data.student_id})` : data.student;
                htmlParts.push(`<div><strong>${nameLine}</strong></div>`);
                if (data.section) htmlParts.push(`<div>Section: ${data.section}</div>`);
                if (data.time) {
                    try {
                        const dt = new Date(data.time);
                        htmlParts.push(`<div>Time: ${dt.toLocaleString()}</div>`);
                    } catch (e) {
                        htmlParts.push(`<div>Time: ${data.time}</div>`);
                    }
                }
                if (data.message && !data.message.includes(data.student)) htmlParts.push(`<div>${data.message}</div>`);
                document.getElementById('result').innerHTML = htmlParts.join('');
            } else {
                const msg = data?.message || JSON.stringify(data) || 'OK';
                document.getElementById('result').innerText = msg;
            }
        } else {
            const err = data?.error || data?.detail || `${res.status} ${res.statusText}`;
            document.getElementById('result').innerText = `Error: ${err}`;
            console.error('verify-attendance failed', res.status, data);
        }
    })
    .catch(err => {
        console.error('Network error:', err);
        document.getElementById('result').innerText = 'Network error: ' + err.message;
    });
}

// helper to read cookies
function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
    return null;
}

function startScanner() {
    // create singleton instance
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

    Html5Qrcode.getCameras().then(devices => {
        if (devices.length) {
            currentCameraId = devices[0].id;
            html5QrCode.start(
                currentCameraId,
                { fps: 10, qrbox: 250 },
                decodedText => {
                    // stop camera briefly to avoid duplicate reads
                    html5QrCode.stop().catch(()=>{}).finally(()=>{
                        cameraActive = false;
                        processQR(decodedText);
                    });
                },
                () => {
                    // scan failure callback (ignore)
                }
            ).then(()=>{ cameraActive = true; }).catch(err => {
                console.error('Camera start failed:', err);
                document.getElementById('result').innerText = 'Camera not available';
            });
        }
    }).catch(err => {
        console.error(err);
        document.getElementById('result').innerText = 'No cameras found';
    });

    document.getElementById("qr-input").addEventListener("change", async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

        // if camera is active, stop it first to avoid conflicts
        if (cameraActive) {
            await html5QrCode.stop().catch(()=>{});
            cameraActive = false;
        }

        html5QrCode.scanFile(file, true)
            .then(text => processQR(text))
            .catch(err => {
                console.error(err);
                document.getElementById('result').innerText = '❌ Could not read QR from file';
            })
            .finally(async () => {
                // try to restart camera after file scan
                if (currentCameraId) {
                    try {
                        await html5QrCode.start(currentCameraId, { fps: 10, qrbox: 250 }, decodedText => {
                            html5QrCode.stop().catch(()=>{}).finally(()=>{
                                cameraActive = false;
                                processQR(decodedText);
                            });
                        });
                        cameraActive = true;
                    } catch(e) {
                        console.warn('Could not restart camera:', e);
                    }
                }
            });
    });
}

</script>

</body>
</html>
