{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECC Attendance | Admin Login</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body class="theme-admin-login">
    <main class="login-screen">
        <section class="admin-login-card">
            <div class="admin-login-brand">ECC Attendance</div>
            <h1>Admin Access</h1>

            <form id="loginForm" class="admin-login-form">
                <label class="form-block">
                    <span>Username</span>
                    <input type="text" id="username" autocomplete="username" placeholder="Enter credentials">
                </label>

                <label class="form-block">
                    <span>Password</span>
                    <input type="password" id="password" autocomplete="current-password" placeholder="Enter password">
                </label>

                <button type="submit" class="student-primary-btn">Secure Login</button>
            </form>

            <div id="loginError" class="login-error"></div>
        </section>
    </main>

    <script>
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            return parts.length === 2 ? parts.pop().split(";").shift() : "";
        }

        document.getElementById("loginForm").addEventListener("submit", async (event) => {
            event.preventDefault();

            const response = await fetch("/api/login/", {
                method: "POST",
                credentials: "include",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": getCookie("csrftoken"),
                },
                body: JSON.stringify({
                    username: document.getElementById("username").value.trim(),
                    password: document.getElementById("password").value,
                }),
            });

            const data = await response.json();
            if (!response.ok) {
                document.getElementById("loginError").textContent = data.error || "Login failed";
                return;
            }

            window.location.href = "/portal/";
        });
    </script>
</body>
</html>
